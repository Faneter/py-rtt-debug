version: "4.1"
name: DevEnv
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Core
  - Drivers
  - ../RTT
  - ../RTT/Debug
virtualFolder:
  name: <virtual_root>
  files:
    - path: MDK-ARM/startup_stm32f103xb.s
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 392369782db38654afaed290be3665c8
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F103xB
      incList: []
      libList: []
    excludeList: []
    toolchain: AC6
    toolchainConfigMap:
      AC6:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 3
          afterBuildTasks: []
          asm-compiler:
            $use: asm-auto
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c17
            language-cpp: c++11
            misc-controls: -Wl,-u_printf_float
            optimization: level-0
            warnings: ac5-like-warnings
          global:
            output-debug-info: enable
          linker:
            $outputTaskExcludes:
              - .bin
            misc-controls: --diag_suppress=L6329
            output-format: elf
        scatterFilePath: <YOUR_SCATTER_FILE>.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: true
              mem:
                size: "0x5000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x10000"
                startAddr: "0x08000000"
              tag: IROM
        useCustomScatterFile: false
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: <YOUR_LINKER_SCRIPT>.lds
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32F103C8
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
